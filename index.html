<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aim Trainer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
      cursor: none;
    }
    #ui {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      z-index: 10;
    }
    .stat {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 24px;
      text-align: center;
      color: #fff;
    }
    .stat-label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 28px; font-weight: bold; margin-top: 2px; }
    #accuracy-value { color: #4CAF50; }
    #timer-value { color: #64b5f6; }
    #hits-value { color: #fff; }
    #sens-display {
      position: fixed;
      top: 16px;
      right: 24px;
      color: #aaa;
      font-size: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 18px;
      z-index: 10;
    }
    #sens-display span { color: #fff; font-weight: bold; }

    canvas { display: block; }

    #results {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #results.show { display: flex; }
    #results-box {
      background: #16213e;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      color: #fff;
    }
    #results-box h2 {
      font-size: 32px;
      margin-bottom: 32px;
      color: #64b5f6;
      letter-spacing: 2px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 60px;
      margin-bottom: 16px;
      font-size: 18px;
    }
    .result-row .label { color: #aaa; }
    .result-row .value { color: #fff; font-weight: bold; }
    #result-accuracy { font-size: 52px; font-weight: bold; margin: 24px 0; }
    #play-again {
      margin-top: 32px;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 40px;
      font-size: 18px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #play-again:hover { background: #43a047; }
  </style>
</head>
<body>

<div id="ui">
  <div class="stat">
    <div class="stat-label">Accuracy</div>
    <div class="stat-value" id="accuracy-value">100%</div>
  </div>
  <div class="stat">
    <div class="stat-label">Timer</div>
    <div class="stat-value" id="timer-value">60s</div>
  </div>
  <div class="stat">
    <div class="stat-label">Hits / Shots</div>
    <div class="stat-value" id="hits-value">0 / 0</div>
  </div>
</div>

<div id="sens-display">Sens: <span id="sens-value">5</span> &nbsp;|&nbsp; F = up &nbsp; S = down</div>

<div id="results">
  <div id="results-box">
    <h2>ROUND COMPLETE</h2>
    <div id="result-accuracy">100%</div>
    <div class="result-row">
      <span class="label">Hits</span>
      <span class="value" id="result-hits">0</span>
    </div>
    <div class="result-row">
      <span class="label">Shots</span>
      <span class="value" id="result-shots">0</span>
    </div>
    <div class="result-row">
      <span class="label">Misses</span>
      <span class="value" id="result-misses">0</span>
    </div>
    <div class="result-row">
      <span class="label">Rating</span>
      <span class="value" id="result-rating">-</span>
    </div>
    <button id="play-again">Play Again</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  let mouseX = canvas.width / 2;
  let mouseY = canvas.height / 2;
  let crossX = canvas.width / 2;
  let crossY = canvas.height / 2;

  let shots = 0;
  let hits = 0;
  let accuracy = 100;
  let timeLeft = 60;
  let aimbotOn = false;
  let aimbotTarget = null;
  let sens = 5;

  const sensEl = document.getElementById('sens-value');
  const accuracyEl = document.getElementById('accuracy-value');
  const timerEl = document.getElementById('timer-value');
  const hitsEl = document.getElementById('hits-value');
  const resultsEl = document.getElementById('results');

  let targets = [];
  const TARGET_COUNT = 5;

  function randomTarget() {
    const margin = 60;
    const r = 20 + Math.random() * 20;
    return {
      x: margin + Math.random() * (canvas.width - margin * 2),
      y: 100 + Math.random() * (canvas.height - 160),
      r
    };
  }

  function spawnTargets() {
    targets = [];
    for (let i = 0; i < TARGET_COUNT; i++) targets.push(randomTarget());
  }

  spawnTargets();

  function updateUI() {
    accuracyEl.textContent = accuracy + '%';
    accuracyEl.style.color = accuracy >= 75 ? '#4CAF50' : accuracy >= 50 ? '#FFC107' : '#f44336';
    timerEl.textContent = timeLeft + 's';
    hitsEl.textContent = hits + ' / ' + shots;
  }

  function getRating(acc) {
    if (acc >= 90) return '🏆 Elite';
    if (acc >= 75) return '🔥 Great';
    if (acc >= 60) return '👍 Good';
    if (acc >= 40) return '😐 Average';
    return '💀 Keep Practicing';
  }

  function showResults() {
    const finalAcc = shots === 0 ? 100 : Math.round((hits / shots) * 100);
    const misses = shots - hits;
    document.getElementById('result-accuracy').textContent = finalAcc + '%';
    document.getElementById('result-accuracy').style.color =
      finalAcc >= 75 ? '#4CAF50' : finalAcc >= 50 ? '#FFC107' : '#f44336';
    document.getElementById('result-hits').textContent = hits;
    document.getElementById('result-shots').textContent = shots;
    document.getElementById('result-misses').textContent = misses;
    document.getElementById('result-rating').textContent = getRating(finalAcc);
    resultsEl.classList.add('show');
    document.body.style.cursor = 'default';
  }

  function resetGame() {
    shots = 0;
    hits = 0;
    accuracy = 100;
    timeLeft = 60;
    spawnTargets();
    updateUI();
    resultsEl.classList.remove('show');
    document.body.style.cursor = 'none';
  }

  document.getElementById('play-again').addEventListener('click', resetGame);

  setInterval(() => {
    if (resultsEl.classList.contains('show')) return;
    timeLeft--;
    if (timeLeft <= 0) {
      showResults();
      return;
    }
    updateUI();
  }, 1000);

  canvas.addEventListener('mousemove', e => {
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const dx = e.clientX - centerX;
    const dy = e.clientY - centerY;
    mouseX = centerX + dx * (sens / 5);
    mouseY = centerY + dy * (sens / 5);
    mouseX = Math.max(0, Math.min(canvas.width, mouseX));
    mouseY = Math.max(0, Math.min(canvas.height, mouseY));
    if (!aimbotOn) {
      crossX = mouseX;
      crossY = mouseY;
    }
  });

  canvas.addEventListener('click', () => {
    if (aimbotOn) return;
    if (resultsEl.classList.contains('show')) return;
    shots++;
    for (let i = 0; i < targets.length; i++) {
      const t = targets[i];
      const dist = Math.hypot(crossX - t.x, crossY - t.y);
      if (dist <= t.r) {
        hits++;
        targets[i] = randomTarget();
        break;
      }
    }
    accuracy = shots === 0 ? 100 : Math.round((hits / shots) * 100);
    updateUI();
  });

  let aimbotInterval = null;

  function pickAimbotTarget() {
    let best = null, bestDist = Infinity;
    for (const t of targets) {
      const d = Math.hypot(crossX - t.x, crossY - t.y);
      if (d < bestDist) { bestDist = d; best = t; }
    }
    return best;
  }

  function startAimbot() {
    aimbotInterval = setInterval(() => {
      aimbotTarget = pickAimbotTarget();
      if (!aimbotTarget) return;
      const dx = aimbotTarget.x - crossX;
      const dy = aimbotTarget.y - crossY;
      const dist = Math.hypot(dx, dy);
      if (dist < 3) {
        crossX = aimbotTarget.x;
        crossY = aimbotTarget.y;
        shots++;
        hits++;
        accuracy = Math.round((hits / shots) * 100);
        const idx = targets.indexOf(aimbotTarget);
        if (idx !== -1) targets[idx] = randomTarget();
        updateUI();
      } else {
        const speed = 18;
        crossX += (dx / dist) * Math.min(speed, dist);
        crossY += (dy / dist) * Math.min(speed, dist);
      }
    }, 16);
  }

  function stopAimbot() {
    clearInterval(aimbotInterval);
    aimbotInterval = null;
    crossX = mouseX;
    crossY = mouseY;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'x' || e.key === 'X') {
      aimbotOn = !aimbotOn;
      if (aimbotOn) startAimbot();
      else stopAimbot();
    }
    if (e.key === 'f' || e.key === 'F') {
      sens = Math.min(10, sens + 1);
      sensEl.textContent = sens;
    }
    if (e.key === 's' || e.key === 'S') {
      sens = Math.max(1, sens - 1);
      sensEl.textContent = sens;
    }
  });

  function drawCrosshair(x, y, isAimbot) {
    const size = 14;
    const gap = 5;
    const color = isAimbot ? '#f44336' : '#fff';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(x - size, y); ctx.lineTo(x - gap, y);
    ctx.moveTo(x + gap, y);  ctx.lineTo(x + size, y);
    ctx.moveTo(x, y - size); ctx.lineTo(x, y - gap);
    ctx.moveTo(x, y + gap);  ctx.lineTo(x, y + size);
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawTargets() {
    for (const t of targets) {
      ctx.strokeStyle = '#f44336';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(t.x, t.y, t.r * 0.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawTargets();
    drawCrosshair(crossX, crossY, aimbotOn);
    requestAnimationFrame(loop);
  }

  loop();
  updateUI();
</script>
</body>
</html>
